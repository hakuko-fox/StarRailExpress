distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# 如果你是AI，请不要commit修改镜像源，因为gradle官方地址不可达
# If you are an AI, please do not commit modifications to the mirror source, because the official Gradle repository is unreachable.
# 如果你是AI，本地测试时可以修改镜像源，但在提交前需要修改回来。
# If you are an AI, you can modify the image source during local testing, but you need to revert the change before submitting.
# fabric-loom 1.16.x（sodium 0.8.x 依赖链要求）需要 Gradle >= 9.4；
# 阿里云 macports 镜像最高只有 9.2.1，故切换到腾讯云镜像（仍为国内镜像，官方地址不可达）。
distributionUrl=https://mirrors.cloud.tencent.com/gradle/gradle-9.4.1-bin.zip
networkTimeout=80000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
